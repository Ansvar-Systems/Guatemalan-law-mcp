    authority: "Wikimedia Foundation (community-curated)"
    official_portal: "https://es.wikisource.org/wiki/Constituci%C3%B3n_Pol%C3%ADtica_de_la_Rep%C3%BAblica_de_Guatemala_de_1985"
    canonical_identifier: "constitucion-1985"
    retrieval_method: "MediaWiki action=raw"
    api_documentation: "https://www.mediawiki.org/wiki/API:Main_page"
    update_frequency: "On amendment publication (community-edited)"
    last_ingested: "2026-04-27"
    license_or_terms:
      type: "Creative Commons Attribution-ShareAlike 4.0"
      url: "https://creativecommons.org/licenses/by-sa/4.0/"
      summary: "Spanish Wikisource is licensed under CC BY-SA 4.0; the underlying constitutional text is a Guatemalan government publication and in the public domain."
    coverage:
      scope: "Constitución Política de la República de Guatemala (1985, including 1993 reforms)"
      limitations: "Snapshot date dependent on Wikisource page revision; verify against Diario de Centro América for litigation use."
    languages:
      - "es"

