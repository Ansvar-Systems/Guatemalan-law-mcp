# sources.yml
schema_version: "1.0"
mcp_name: "Guatemala Law MCP"
jurisdiction: "GT"
coverage_tier: "D"

# Partial-corpus v1: 8 primary national codes plus the 1985 Constitution,
# fetched from open public sources. The official consolidated gazette
# (CENADOJ / oj.gob.gt) is geo-gated to Guatemalan IPs and is excluded
# from this corpus by infrastructure constraint, not by choice.

sources:
