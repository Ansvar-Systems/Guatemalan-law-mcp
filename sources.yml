      summary: "Guatemalan statute deposited with UN DOALOS; underlying text is a Guatemalan government publication and in the public domain."
    coverage:
      scope: "Código Penal de Guatemala (Decreto 17-73)"
      limitations: "Reflects DOALOS archive snapshot; amendments enacted after the snapshot are not applied."
    languages:
      - "es"

